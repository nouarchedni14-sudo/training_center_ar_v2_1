{% extends "admin/change_list.html" %}
{% load i18n %}

{% block object-tools-items %}
  {{ block.super }}
  {% if clear_filtered_url and has_active_filters %}
    <li>
      <a href="{{ clear_filtered_url }}" class="button" style="background:#b45309;color:#fff;border-radius:10px;padding:6px 10px;">🧹 حذف النتائج الحالية</a>
    </li>
  {% endif %}
  {% if clear_all_url %}

      <a href="{{ clear_all_url }}" class="deletelink" style="background:#b91c1c;color:#fff;border-radius:10px;padding:6px 10px;">🗑 حذف كامل السجل</a>
    </li>
  {% endif %}
{% endblock %}

{% load static %}
<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title|default:"خطأ" }}</title>
  <link rel="stylesheet" href="{% static 'css/ui.css' %}?v=20260419err1">
  <style>
    body{font-family:Tahoma,Arial,sans-serif;background:#f4f7f5;color:#163126;margin:0}
    .wrap{max-width:760px;margin:8vh auto;padding:24px}
    .card{background:#fff;border:1px solid rgba(15,118,110,.14);border-radius:22px;padding:28px;box-shadow:0 10px 30px rgba(15,23,42,.08)}
    .eyebrow{display:inline-block;background:#fff7ed;color:#9a6700;border:1px solid #f5d7a1;border-radius:999px;padding:6px 12px;font-size:13px;margin-bottom:14px}
    h1{margin:0 0 10px;font-size:32px}
    p{font-size:18px;line-height:1.9;color:#355449}
    .actions{margin-top:22px;display:flex;gap:10px;flex-wrap:wrap}
    .btn-small{display:inline-flex;align-items:center;justify-content:center;padding:9px 16px;border-radius:12px;background:#0f766e;color:#fff;text-decoration:none;font-size:14px}
    .btn-small.secondary{background:#fff;color:#0f766e;border:1px solid rgba(15,118,110,.22)}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <span class="eyebrow">خطأ {{ status_code|default:"" }}</span>
      <h1>{{ error_title|default:"حدث خطأ" }}</h1>
      <p>{{ error_message|default:"حدث خطأ غير متوقع داخل البرنامج." }}</p>
      <div class="actions">
        <a class="btn-small" href="/">الرجوع إلى صفحة الدخول</a>
        <a class="btn-small secondary" href="javascript:history.back()">رجوع</a>
      </div>
    </div>
  </div>
</body>
</html>
